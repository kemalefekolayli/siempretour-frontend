server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /404.html;
    }

    location ~* \.(jpg|jpeg|png|webp|gif|svg|css|js|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
